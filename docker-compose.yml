services:
  backend:
    image: ton-bot:latest
    container_name: ton-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TON_API_KEY=${TON_API_KEY}
      - ADMIN_ID=${ADMIN_ID}
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_MNEMONIC=${ADMIN_MNEMONIC}
      - TON_NETWORK=${TON_NETWORK}
    volumes:
      - ./data:/app/data
    networks:
      - ton-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  ton-network:
    external: true
    name: ton-network